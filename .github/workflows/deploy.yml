name: deploy-cloud-run

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION }}
  REPOSITORY: ${{ vars.ARTIFACT_REGISTRY_REPOSITORY }}
  IMAGE_NAME: the-cognitive-swarm

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

  build:
    runs-on: ubuntu-latest
    needs: validate
    environment: staging
    outputs:
      image: ${{ steps.image.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.DEPLOY_WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOY_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - id: image
        run: echo "image=${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/${IMAGE_NAME}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build image
        run: docker build -t "${{ steps.image.outputs.image }}" .

      - name: Push image
        run: docker push "${{ steps.image.outputs.image }}"

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.DEPLOY_WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOY_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Resolve staging deploy config
        id: tf
        env:
          APP_ENV: ${{ vars.APP_ENV || 'staging' }}
          CLOUD_RUN_SERVICE: ${{ vars.CLOUD_RUN_SERVICE || vars.CLOUD_RUN_SERVICE_STAGING }}
          RUNTIME_SERVICE_ACCOUNT: ${{ vars.RUNTIME_SERVICE_ACCOUNT || vars.RUNTIME_SERVICE_ACCOUNT_STAGING }}
          VPC_CONNECTOR: ${{ vars.VPC_CONNECTOR || vars.VPC_CONNECTOR_STAGING }}
          REDIS_HOST: ${{ vars.REDIS_HOST || vars.REDIS_HOST_STAGING }}
          REDIS_PORT: ${{ vars.REDIS_PORT || vars.REDIS_PORT_STAGING }}
          MIN_INSTANCES: ${{ vars.MIN_INSTANCES || vars.MIN_INSTANCES_STAGING }}
          MAX_INSTANCES: ${{ vars.MAX_INSTANCES || vars.MAX_INSTANCES_STAGING }}
        run: |
          for required_var in CLOUD_RUN_SERVICE RUNTIME_SERVICE_ACCOUNT VPC_CONNECTOR REDIS_HOST REDIS_PORT MIN_INSTANCES MAX_INSTANCES; do
            if [ -z "${!required_var}" ]; then
              echo "::error::Missing required staging variable ${required_var}"
              exit 1
            fi
          done
          {
            echo "app_env=${APP_ENV}"
            echo "cloud_run_service=${CLOUD_RUN_SERVICE}"
            echo "runtime_service_account=${RUNTIME_SERVICE_ACCOUNT}"
            echo "vpc_connector=${VPC_CONNECTOR}"
            echo "redis_host=${REDIS_HOST}"
            echo "redis_port=${REDIS_PORT}"
            echo "min_instances=${MIN_INSTANCES}"
            echo "max_instances=${MAX_INSTANCES}"
          } >> "$GITHUB_OUTPUT"

      - name: Deploy staging revision
        run: |
          gcloud run deploy "${{ steps.tf.outputs.cloud_run_service }}" \
            --image "${{ needs.build.outputs.image }}" \
            --region "${REGION}" \
            --platform managed \
            --allow-unauthenticated \
            --service-account "${{ steps.tf.outputs.runtime_service_account }}" \
            --vpc-connector "${{ steps.tf.outputs.vpc_connector }}" \
            --vpc-egress private-ranges-only \
            --set-env-vars "APP_ENV=${{ steps.tf.outputs.app_env }},NODE_ENV=production,DEFAULT_ROOM_ID=main-room,REQUIRE_REDIS=true,REQUIRE_FIRESTORE=true,ALLOW_IN_MEMORY_STATE=false,FIRESTORE_COLLECTION=${{ vars.FIRESTORE_COLLECTION }},REDIS_HOST=${{ steps.tf.outputs.redis_host }},REDIS_PORT=${{ steps.tf.outputs.redis_port }}" \
            --set-secrets "GEMINI_API_KEY=${{ vars.GEMINI_SECRET_ID }}:latest" \
            --min-instances "${{ steps.tf.outputs.min_instances }}" \
            --max-instances "${{ steps.tf.outputs.max_instances }}" \
            --concurrency 20 \
            --timeout 3600 \
            --cpu 2 \
            --memory 2Gi \
            --cpu-boost \
            --quiet

      - name: Smoke test staging
        run: |
          URL="$(gcloud run services describe "${{ steps.tf.outputs.cloud_run_service }}" --region "${REGION}" --format='value(status.url)')"
          curl -fsSL "${URL}/api/health"
          curl -fsSL "${URL}/api/ready"

  deploy-prod:
    runs-on: ubuntu-latest
    needs: [build, deploy-staging]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.DEPLOY_WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOY_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Resolve production deploy config
        id: tf
        env:
          APP_ENV: ${{ vars.APP_ENV || 'prod' }}
          CLOUD_RUN_SERVICE: ${{ vars.CLOUD_RUN_SERVICE || vars.CLOUD_RUN_SERVICE_PROD }}
          RUNTIME_SERVICE_ACCOUNT: ${{ vars.RUNTIME_SERVICE_ACCOUNT || vars.RUNTIME_SERVICE_ACCOUNT_PROD }}
          VPC_CONNECTOR: ${{ vars.VPC_CONNECTOR || vars.VPC_CONNECTOR_PROD }}
          REDIS_HOST: ${{ vars.REDIS_HOST || vars.REDIS_HOST_PROD }}
          REDIS_PORT: ${{ vars.REDIS_PORT || vars.REDIS_PORT_PROD }}
          MIN_INSTANCES: ${{ vars.MIN_INSTANCES || vars.MIN_INSTANCES_PROD }}
          MAX_INSTANCES: ${{ vars.MAX_INSTANCES || vars.MAX_INSTANCES_PROD }}
        run: |
          for required_var in CLOUD_RUN_SERVICE RUNTIME_SERVICE_ACCOUNT VPC_CONNECTOR REDIS_HOST REDIS_PORT MIN_INSTANCES MAX_INSTANCES; do
            if [ -z "${!required_var}" ]; then
              echo "::error::Missing required production variable ${required_var}"
              exit 1
            fi
          done
          {
            echo "app_env=${APP_ENV}"
            echo "cloud_run_service=${CLOUD_RUN_SERVICE}"
            echo "runtime_service_account=${RUNTIME_SERVICE_ACCOUNT}"
            echo "vpc_connector=${VPC_CONNECTOR}"
            echo "redis_host=${REDIS_HOST}"
            echo "redis_port=${REDIS_PORT}"
            echo "min_instances=${MIN_INSTANCES}"
            echo "max_instances=${MAX_INSTANCES}"
          } >> "$GITHUB_OUTPUT"

      - name: Deploy production revision
        run: |
          gcloud run deploy "${{ steps.tf.outputs.cloud_run_service }}" \
            --image "${{ needs.build.outputs.image }}" \
            --region "${REGION}" \
            --platform managed \
            --allow-unauthenticated \
            --service-account "${{ steps.tf.outputs.runtime_service_account }}" \
            --vpc-connector "${{ steps.tf.outputs.vpc_connector }}" \
            --vpc-egress private-ranges-only \
            --set-env-vars "APP_ENV=${{ steps.tf.outputs.app_env }},NODE_ENV=production,DEFAULT_ROOM_ID=main-room,REQUIRE_REDIS=true,REQUIRE_FIRESTORE=true,ALLOW_IN_MEMORY_STATE=false,FIRESTORE_COLLECTION=${{ vars.FIRESTORE_COLLECTION }},REDIS_HOST=${{ steps.tf.outputs.redis_host }},REDIS_PORT=${{ steps.tf.outputs.redis_port }}" \
            --set-secrets "GEMINI_API_KEY=${{ vars.GEMINI_SECRET_ID }}:latest" \
            --min-instances "${{ steps.tf.outputs.min_instances }}" \
            --max-instances "${{ steps.tf.outputs.max_instances }}" \
            --concurrency 20 \
            --timeout 3600 \
            --cpu 2 \
            --memory 2Gi \
            --cpu-boost \
            --quiet

      - name: Smoke test production
        run: |
          URL="$(gcloud run services describe "${{ steps.tf.outputs.cloud_run_service }}" --region "${REGION}" --format='value(status.url)')"
          curl -fsSL "${URL}/api/health"
          curl -fsSL "${URL}/api/ready"
