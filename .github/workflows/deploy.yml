name: deploy-cloud-run

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION }}
  REPOSITORY: ${{ vars.ARTIFACT_REGISTRY_REPOSITORY }}
  IMAGE_NAME: the-cognitive-swarm
  TERRAFORM_STATE_BUCKET: ${{ vars.TERRAFORM_STATE_BUCKET }}
  TERRAFORM_STATE_PREFIX: ${{ vars.TERRAFORM_STATE_PREFIX }}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

  build:
    runs-on: ubuntu-latest
    needs: validate
    environment: staging
    outputs:
      image: ${{ steps.image.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.DEPLOY_WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOY_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: hashicorp/setup-terraform@v3

      - name: Load staging Terraform outputs
        id: staging_tf
        working-directory: infra/terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${TERRAFORM_STATE_BUCKET}" \
            -backend-config="prefix=${TERRAFORM_STATE_PREFIX}/staging" >/dev/null
          {
            echo "artifact_registry_repository=$(terraform output -raw artifact_registry_repository)"
          } >> "$GITHUB_OUTPUT"

      - name: Configure Docker auth
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - id: image
        run: echo "image=${REGION}-docker.pkg.dev/${PROJECT_ID}/${{ steps.staging_tf.outputs.artifact_registry_repository }}/${IMAGE_NAME}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build image
        run: docker build -t "${{ steps.image.outputs.image }}" .

      - name: Push image
        run: docker push "${{ steps.image.outputs.image }}"

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.DEPLOY_WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOY_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: hashicorp/setup-terraform@v3

      - name: Load staging Terraform outputs
        id: tf
        working-directory: infra/terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${TERRAFORM_STATE_BUCKET}" \
            -backend-config="prefix=${TERRAFORM_STATE_PREFIX}/staging" >/dev/null
          {
            echo "app_env=$(terraform output -raw app_environment)"
            echo "cloud_run_service=$(terraform output -raw cloud_run_service_name)"
            echo "runtime_service_account=$(terraform output -raw runtime_service_account_email)"
            echo "vpc_connector=$(terraform output -raw vpc_connector_name)"
            echo "redis_host=$(terraform output -raw redis_host)"
            echo "redis_port=$(terraform output -raw redis_port)"
            echo "min_instances=$(terraform output -raw min_instances)"
            echo "max_instances=$(terraform output -raw max_instances)"
          } >> "$GITHUB_OUTPUT"

      - name: Deploy staging revision
        run: |
          gcloud run deploy "${{ steps.tf.outputs.cloud_run_service }}" \
            --image "${{ needs.build.outputs.image }}" \
            --region "${REGION}" \
            --platform managed \
            --allow-unauthenticated \
            --service-account "${{ steps.tf.outputs.runtime_service_account }}" \
            --vpc-connector "${{ steps.tf.outputs.vpc_connector }}" \
            --vpc-egress private-ranges-only \
            --set-env-vars "APP_ENV=${{ steps.tf.outputs.app_env }},NODE_ENV=production,DEFAULT_ROOM_ID=main-room,REQUIRE_REDIS=true,REQUIRE_FIRESTORE=true,ALLOW_IN_MEMORY_STATE=false,FIRESTORE_COLLECTION=${{ vars.FIRESTORE_COLLECTION }},REDIS_HOST=${{ steps.tf.outputs.redis_host }},REDIS_PORT=${{ steps.tf.outputs.redis_port }}" \
            --set-secrets "GEMINI_API_KEY=${{ vars.GEMINI_SECRET_ID }}:latest" \
            --min-instances "${{ steps.tf.outputs.min_instances }}" \
            --max-instances "${{ steps.tf.outputs.max_instances }}" \
            --concurrency 20 \
            --timeout 3600 \
            --cpu 2 \
            --memory 2Gi \
            --cpu-boost \
            --quiet

      - name: Smoke test staging
        run: |
          URL="$(gcloud run services describe "${{ steps.tf.outputs.cloud_run_service }}" --region "${REGION}" --format='value(status.url)')"
          curl -fsSL "${URL}/api/health"
          curl -fsSL "${URL}/api/ready"

  deploy-prod:
    runs-on: ubuntu-latest
    needs: [build, deploy-staging]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.DEPLOY_WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOY_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: hashicorp/setup-terraform@v3

      - name: Load production Terraform outputs
        id: tf
        working-directory: infra/terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${TERRAFORM_STATE_BUCKET}" \
            -backend-config="prefix=${TERRAFORM_STATE_PREFIX}/prod" >/dev/null
          {
            echo "app_env=$(terraform output -raw app_environment)"
            echo "cloud_run_service=$(terraform output -raw cloud_run_service_name)"
            echo "runtime_service_account=$(terraform output -raw runtime_service_account_email)"
            echo "vpc_connector=$(terraform output -raw vpc_connector_name)"
            echo "redis_host=$(terraform output -raw redis_host)"
            echo "redis_port=$(terraform output -raw redis_port)"
            echo "min_instances=$(terraform output -raw min_instances)"
            echo "max_instances=$(terraform output -raw max_instances)"
          } >> "$GITHUB_OUTPUT"

      - name: Deploy production revision
        run: |
          gcloud run deploy "${{ steps.tf.outputs.cloud_run_service }}" \
            --image "${{ needs.build.outputs.image }}" \
            --region "${REGION}" \
            --platform managed \
            --allow-unauthenticated \
            --service-account "${{ steps.tf.outputs.runtime_service_account }}" \
            --vpc-connector "${{ steps.tf.outputs.vpc_connector }}" \
            --vpc-egress private-ranges-only \
            --set-env-vars "APP_ENV=${{ steps.tf.outputs.app_env }},NODE_ENV=production,DEFAULT_ROOM_ID=main-room,REQUIRE_REDIS=true,REQUIRE_FIRESTORE=true,ALLOW_IN_MEMORY_STATE=false,FIRESTORE_COLLECTION=${{ vars.FIRESTORE_COLLECTION }},REDIS_HOST=${{ steps.tf.outputs.redis_host }},REDIS_PORT=${{ steps.tf.outputs.redis_port }}" \
            --set-secrets "GEMINI_API_KEY=${{ vars.GEMINI_SECRET_ID }}:latest" \
            --min-instances "${{ steps.tf.outputs.min_instances }}" \
            --max-instances "${{ steps.tf.outputs.max_instances }}" \
            --concurrency 20 \
            --timeout 3600 \
            --cpu 2 \
            --memory 2Gi \
            --cpu-boost \
            --quiet

      - name: Smoke test production
        run: |
          URL="$(gcloud run services describe "${{ steps.tf.outputs.cloud_run_service }}" --region "${REGION}" --format='value(status.url)')"
          curl -fsSL "${URL}/api/health"
          curl -fsSL "${URL}/api/ready"
